<!doctype html>
<html lang="en">
  <head>

        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Task Scheduler and sync configuration files for Task-Scheduler-Rules."
    />
    <title>Task Scheduler Rules</title>
    <style>
      :root {
        --bg: #0b1220;
        --bg-alt: #111b2e;
        --card: #17253e;
        --card-border: #273a5e;
        --text: #e8eef9;
        --muted: #9db0d4;
        --link: #8ed0ff;
        --accent: #5ea2ff;
        --success: #7ee7ac;
        --danger: #ff9ca0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, var(--bg), #08101d 60%, #070d18);
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }

      .hero {
        background: linear-gradient(135deg, #182a47, #121f37 60%, #0f1a2f);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 22px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 1.8rem;
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .chip {
        border: 1px solid #2f4875;
        background: rgba(94, 162, 255, 0.12);
        color: #c8defe;
        border-radius: 999px;
        padding: 5px 11px;
        font-size: 0.86rem;
      }

      .panel {
        background: var(--bg-alt);
        border: 1px solid var(--card-border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 16px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 180px;
        gap: 10px;
      }

      input,
      select {
        width: 100%;
        color: var(--text);
        background: #0f1a2d;
        border: 1px solid #2a4068;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
      }

      .status {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .error {
        color: var(--danger);
      }

      .groups {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 12px;
      }

      .group {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 12px;
        min-height: 140px;
      }

      .group h2 {
        margin: 0;
        font-size: 1rem;
      }

      .group .count {
        color: var(--success);
        font-size: 0.88rem;
        margin-left: 6px;
      }

      ul {
        margin: 10px 0 0;
        padding-left: 18px;
      }

      li {
        margin: 7px 0;
        line-height: 1.3;
      }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .footer {
        margin-top: 16px;
        color: var(--muted);
        font-size: 0.85rem;
      }

      @media (max-width: 700px) {
        main {
          padding: 16px;
        }

        .controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-T8J6HPLF"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <main>
      <section class="hero">
        <h1>Task Scheduler Rules</h1>
        <p class="subtitle">
          Browse published task/sync config files from
          <strong>Nick2bad4u/Task-Scheduler-Rules</strong>.
        </p>
        <div class="chips" id="summaryChips"></div>
      </section>

      <section class="panel">
        <div class="controls">
          <input
            id="searchInput"
            type="search"
            placeholder="Search files (e.g. OneDrive, RuneLite, weekly)..."
            autocomplete="off"
          />
          <select id="typeFilter">
            <option value="all">All file types</option>
          </select>
        </div>
        <div id="status" class="status">Loading files…</div>
      </section>

      <section id="groups" class="groups"></section>

      <div class="footer">
        Auto-loaded from GitHub API, then linked to GitHub Pages-hosted file URLs.
      </div>
    </main>

    <script>
      const owner = "Nick2bad4u";
      const repo = "Task-Scheduler-Rules";
      const branch = "main";
      const baseSite = `https://${owner.toLowerCase()}.github.io/${repo}`;

      const extensionLabels = {
        ".xml": "Task XML",
        ".ffs_batch": "FreeFileSync Batch",
        ".ffs_gui": "FreeFileSync GUI",
        ".ffs_db": "FreeFileSync DB",
        ".txt": "Text"
      };

      const includeExtensions = Object.keys(extensionLabels);

      const statusEl = document.getElementById("status");
      const groupsEl = document.getElementById("groups");
      const chipsEl = document.getElementById("summaryChips");
      const searchInput = document.getElementById("searchInput");
      const typeFilter = document.getElementById("typeFilter");

      let allFiles = [];

      function getExt(name) {
        const lower = name.toLowerCase();
        const ext = includeExtensions.find((item) => lower.endsWith(item));
        return ext || null;
      }

      function siteUrlFor(path) {
        return `${baseSite}/${path
          .split("/")
          .map(encodeURIComponent)
          .join("/")}`;
      }

      function createChip(text) {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = text;
        return chip;
      }

      function updateSummary(files) {
        chipsEl.innerHTML = "";
        chipsEl.appendChild(createChip(`Total files: ${files.length}`));

        const byType = new Map();
        for (const file of files) {
          byType.set(file.ext, (byType.get(file.ext) || 0) + 1);
        }

        for (const ext of includeExtensions) {
          const count = byType.get(ext) || 0;
          chipsEl.appendChild(createChip(`${extensionLabels[ext]}: ${count}`));
        }
      }

      function populateTypeFilter() {
        for (const ext of includeExtensions) {
          const opt = document.createElement("option");
          opt.value = ext;
          opt.textContent = extensionLabels[ext];
          typeFilter.appendChild(opt);
        }
      }

      function applyFilters() {
        const query = searchInput.value.trim().toLowerCase();
        const extFilter = typeFilter.value;

        const filtered = allFiles.filter((file) => {
          const matchesQuery = !query || file.path.toLowerCase().includes(query);
          const matchesType = extFilter === "all" || file.ext === extFilter;
          return matchesQuery && matchesType;
        });

        renderGroups(filtered);
        statusEl.classList.remove("error");
        statusEl.textContent = `Showing ${filtered.length} of ${allFiles.length} files.`;
      }

      function renderGroups(files) {
        groupsEl.innerHTML = "";

        const grouped = new Map();
        for (const file of files) {
          if (!grouped.has(file.ext)) grouped.set(file.ext, []);
          grouped.get(file.ext).push(file);
        }

        for (const ext of includeExtensions) {
          const bucket = grouped.get(ext) || [];
          if (bucket.length === 0) continue;

          bucket.sort((a, b) => a.path.localeCompare(b.path));

          const card = document.createElement("article");
          card.className = "group";

          const title = document.createElement("h2");
          title.innerHTML = `${extensionLabels[ext]} <span class="count">(${bucket.length})</span>`;
          card.appendChild(title);

          const ul = document.createElement("ul");
          for (const file of bucket) {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = siteUrlFor(file.path);
            a.textContent = file.path;
            li.appendChild(a);
            ul.appendChild(li);
          }

          card.appendChild(ul);
          groupsEl.appendChild(card);
        }

        if (groupsEl.children.length === 0) {
          const empty = document.createElement("div");
          empty.className = "group";
          empty.textContent = "No files match your current filter.";
          groupsEl.appendChild(empty);
        }
      }

      async function loadFiles() {
        try {
          const res = await fetch(
            `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`,
            { headers: { Accept: "application/vnd.github+json" } }
          );

          if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);

          const data = await res.json();
          allFiles = (data.tree || [])
            .filter((item) => item.type === "blob")
            .map((item) => ({ path: item.path, ext: getExt(item.path) }))
            .filter((item) => item.ext);

          updateSummary(allFiles);
          applyFilters();
        } catch (err) {
          statusEl.classList.add("error");
          statusEl.textContent =
            "Could not load file list automatically. Please refresh in a minute.";
          console.error(err);
        }
      }

      populateTypeFilter();
      searchInput.addEventListener("input", applyFilters);
      typeFilter.addEventListener("change", applyFilters);
      loadFiles();
    </script>
  </body>
</html>
